
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎮 Tic Tac Toe Ultimate</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <!-- Header -->

    <header class="header">

        <h1>🎮 Tic Tac Toe Ultimate</h1>

        <p>Modern HTML • CSS • JavaScript Game</p>

    </header>

    <!-- Controls -->

    <section class="controls">

        <div class="mode">

            <label>Game Mode</label>

            <select id="gameMode">

                <option>Player vs Player</option>

                <option>Player vs Computer</option>

            </select>

        </div>

        <div class="difficulty">

            <label>Difficulty</label>

            <select id="difficulty">

                <option>Easy</option>

                <option selected>Medium</option>

                <option>Hard</option>

            </select>

        </div>

        <button id="themeBtn">
            🌙
        </button>

        <button id="soundBtn">
            🔊
        </button>

    </section>

    <!-- Scoreboard -->

    <section class="scoreboard">

        <div class="score-card">

            <h3>❌ Player X</h3>

            <h1 id="scoreX">0</h1>

        </div>

        <div class="score-card">

            <h3>⭕ Player O</h3>

            <h1 id="scoreO">0</h1>

        </div>

        <div class="score-card">

            <h3>🤝 Draws</h3>

            <h1 id="drawScore">0</h1>

        </div>

    </section>

    <!-- Round -->

    <section class="top-info">

        <div>

            🏁 Round
            <span id="round">1</span>

        </div>

        <div>

            ⏳
            <span id="timer">30</span>s

        </div>

    </section>

    <!-- Status -->

    <section>

        <h2 id="status">

            ❌ Player X's Turn

        </h2>

    </section>

    <!-- Game Board -->

    <section class="board" id="board">

        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>

        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>

        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>

    </section>

    <!-- Buttons -->

    <section class="buttons">

        <button id="restart">

            🔄 Restart Round

        </button>

        <button id="newGame">

            🎮 New Game

        </button>

        <button id="undo">

            ↩ Undo

        </button>

    </section>

    <!-- Match History -->

    <section class="history">

        <h3>

            📜 Match History

        </h3>

        <ul id="historyList">

        </ul>

    </section>

    <!-- Statistics -->

    <section class="stats">

        <div>

            🏆 Wins
            <span id="wins">0</span>

        </div>

        <div>

            ❌ Losses
            <span id="losses">0</span>

        </div>

        <div>

            🤝 Draws
            <span id="draws">0</span>

        </div>

        <div>

            🔥 Win Streak
            <span id="streak">0</span>

        </div>

    </section>

    <!-- Footer -->

    <footer>

        <small>

            Developed by Your Name • HTML • CSS • JavaScript

        </small>

    </footer>

</div>

<script src="script.js"></script>

</body>

</html>
